name: Build and push Docker image

# - Pull requests build the image (validation only, no push).
# - Pushes to main and manual runs build the image and publish it to Docker Hub.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      # Fall back to a local image name when the Docker Hub username secret is
      # not configured (e.g. on pull requests), so build validation still works.
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/rsds-infra-company-page', secrets.DOCKERHUB_USERNAME) || 'rsds-infra-company-page' }}
      PUSH: ${{ github.event_name != 'pull_request' && secrets.DOCKERHUB_USERNAME != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:git-${{ github.sha }}
