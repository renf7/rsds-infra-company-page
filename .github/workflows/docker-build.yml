name: Build and push Docker image

# Only a remote push that changes main builds and publishes an image.
on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      # Fall back to a local image name when Docker Hub secrets are not configured.
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/rsds-infra-company-page', secrets.DOCKERHUB_USERNAME) || 'rsds-infra-company-page' }}
      PUSH: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:git-${{ github.sha }}
